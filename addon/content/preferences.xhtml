<linkset>
  <html:link rel="localization" href="__addonRef__-preferences.ftl" />
</linkset>
<vbox id="zotero-prefpane-__addonRef__" onload="Zotero.__addonInstance__.hooks.onPrefsEvent('load', {window})" style="max-width: 760px; min-width: 0;">
  <groupbox style="max-width: 100%; min-width: 0;">
    <label>
      <html:h2 data-l10n-id="pref-title"></html:h2>
    </label>

    <html:div style="display: grid; grid-template-columns: minmax(120px, 180px) minmax(220px, 1fr); gap: 6px 10px; align-items: center; max-width: 100%;">
      <html:label for="zotero-prefpane-__addonRef__-apiBase" data-l10n-id="pref-apiBase-label"></html:label>
      <html:input id="zotero-prefpane-__addonRef__-apiBase" type="text" style="width: 100%; box-sizing: border-box;" />
      <html:label for="zotero-prefpane-__addonRef__-uid" data-l10n-id="pref-uid-label"></html:label>
      <html:input id="zotero-prefpane-__addonRef__-uid" type="text" style="width: 100%; box-sizing: border-box;" />
      <html:label for="zotero-prefpane-__addonRef__-token" data-l10n-id="pref-token-label"></html:label>
      <html:input id="zotero-prefpane-__addonRef__-token" type="password" style="width: 100%; box-sizing: border-box;" />
      <html:label for="zotero-prefpane-__addonRef__-accessMode" data-l10n-id="pref-accessMode-label"></html:label>
      <html:input id="zotero-prefpane-__addonRef__-accessMode" type="text" style="width: 100%; box-sizing: border-box;" />
      <html:label for="zotero-prefpane-__addonRef__-defaultEmail" data-l10n-id="pref-defaultEmail-label"></html:label>
      <html:input id="zotero-prefpane-__addonRef__-defaultEmail" type="text" style="width: 100%; box-sizing: border-box;" />
    </html:div>

    <checkbox id="zotero-prefpane-__addonRef__-autoRequest" data-l10n-id="pref-autoRequest" />

    <hbox flex="1" align="start" pack="start" style="margin-top: 8px; gap: 8px; flex-wrap: wrap;">
      <button id="zotero-prefpane-__addonRef__-save" data-l10n-id="pref-save"></button>
      <button id="zotero-prefpane-__addonRef__-verify" data-l10n-id="pref-verify"></button>
      <button id="zotero-prefpane-__addonRef__-login" data-l10n-id="pref-open-login"></button>
      <button id="zotero-prefpane-__addonRef__-loginHelper" data-l10n-id="pref-open-login-helper"></button>
    </hbox>

    <description id="zotero-prefpane-__addonRef__-status" data-l10n-id="pref-status"></description>
  </groupbox>

  <groupbox style="max-width: 100%; min-width: 0;">
    <label>
      <html:h2 data-l10n-id="pref-download-title"></html:h2>
    </label>

    <checkbox id="zotero-prefpane-__addonRef__-autoDownloadOnAdd" data-l10n-id="pref-download-autoOnAdd" />

    <html:div style="display: grid; grid-template-columns: minmax(120px, 180px) minmax(220px, 1fr); gap: 6px 10px; align-items: center; max-width: 100%;">
      <html:label for="zotero-prefpane-__addonRef__-downloadEngine" data-l10n-id="pref-download-engine-label"></html:label>
      <html:select id="zotero-prefpane-__addonRef__-downloadEngine" style="width: 100%; box-sizing: border-box;">
        <html:option value="scihub-first" data-l10n-id="pref-download-engine-scihub-first"></html:option>
        <html:option value="fmrs-first" data-l10n-id="pref-download-engine-fmrs-first"></html:option>
        <html:option value="scihub-only" data-l10n-id="pref-download-engine-scihub-only"></html:option>
        <html:option value="fmrs-only" data-l10n-id="pref-download-engine-fmrs-only"></html:option>
      </html:select>
      <html:label for="zotero-prefpane-__addonRef__-scihubUrls" data-l10n-id="pref-download-scihubUrls-label"></html:label>
      <html:input id="zotero-prefpane-__addonRef__-scihubUrls" type="text" style="width: 100%; box-sizing: border-box;" />
    </html:div>

    <description data-l10n-id="pref-download-help"></description>
  </groupbox>

  <groupbox style="max-width: 100%; min-width: 0;">
    <label>
      <html:h2 data-l10n-id="pref-agentMail-title"></html:h2>
    </label>

    <checkbox id="zotero-prefpane-__addonRef__-agentMailEnabled" data-l10n-id="pref-agentMail-enabled" />
    <description data-l10n-id="pref-agentMail-help"></description>

    <html:div style="display: grid; grid-template-columns: minmax(120px, 180px) minmax(220px, 1fr); gap: 6px 10px; align-items: center; max-width: 100%; margin-bottom: 8px;">
      <html:label for="zotero-prefpane-__addonRef__-mailBackend" data-l10n-id="pref-mail-backend-label"></html:label>
      <html:select id="zotero-prefpane-__addonRef__-mailBackend" style="width: 100%; box-sizing: border-box;">
        <html:option value="pop3" data-l10n-id="pref-mail-backend-mail"></html:option>
        <html:option value="agently" data-l10n-id="pref-mail-backend-agent-mail"></html:option>
      </html:select>
    </html:div>

    <html:div id="zotero-prefpane-__addonRef__-mailSection" style="margin-top: 8px; border: 1px solid var(--fill-quinary); border-radius: 6px; padding: 8px;">
      <html:h3 data-l10n-id="pref-agentMail-section-mail" style="margin: 0 0 8px 0;"></html:h3>
      <html:div style="display: grid; grid-template-columns: minmax(120px, 180px) minmax(220px, 1fr); gap: 6px 10px; align-items: center; max-width: 100%; margin-top: 8px;">
        <html:label for="zotero-prefpane-__addonRef__-pop3Username" data-l10n-id="pref-pop3-username-label"></html:label>
        <html:input id="zotero-prefpane-__addonRef__-pop3Username" type="text" style="width: 100%; box-sizing: border-box;" />
        <html:label for="zotero-prefpane-__addonRef__-pop3Password" data-l10n-id="pref-pop3-password-label"></html:label>
        <html:input id="zotero-prefpane-__addonRef__-pop3Password" type="password" style="width: 100%; box-sizing: border-box;" />
        <html:label for="zotero-prefpane-__addonRef__-pop3Host" data-l10n-id="pref-pop3-host-label"></html:label>
        <html:input id="zotero-prefpane-__addonRef__-pop3Host" type="text" style="width: 100%; box-sizing: border-box;" />
        <html:label for="zotero-prefpane-__addonRef__-pop3Port" data-l10n-id="pref-pop3-port-label"></html:label>
        <html:input id="zotero-prefpane-__addonRef__-pop3Port" type="number" min="1" max="65535" style="width: 100%; box-sizing: border-box;" />
        <html:label for="zotero-prefpane-__addonRef__-pop3UseSSL" data-l10n-id="pref-pop3-ssl-label"></html:label>
        <checkbox id="zotero-prefpane-__addonRef__-pop3UseSSL" data-l10n-id="pref-pop3-ssl" />
        <html:label for="zotero-prefpane-__addonRef__-agentMailRefreshMinutes" data-l10n-id="pref-agentMail-refreshMinutes-label"></html:label>
        <html:input id="zotero-prefpane-__addonRef__-agentMailRefreshMinutes" type="number" min="1" max="1440" style="width: 100%; box-sizing: border-box;" />
        <html:label for="zotero-prefpane-__addonRef__-agentMailPollLimit" data-l10n-id="pref-agentMail-pollLimit-label"></html:label>
        <html:input id="zotero-prefpane-__addonRef__-agentMailPollLimit" type="number" min="1" max="50" style="width: 100%; box-sizing: border-box;" />
        <html:label for="zotero-prefpane-__addonRef__-agentMailSenderFilter" data-l10n-id="pref-agentMail-senderFilter-label"></html:label>
        <html:input id="zotero-prefpane-__addonRef__-agentMailSenderFilter" type="text" style="width: 100%; box-sizing: border-box;" />
      </html:div>
      <hbox flex="1" align="start" pack="start" style="margin-top: 8px; gap: 8px; flex-wrap: wrap;">
        <button id="zotero-prefpane-__addonRef__-verifyMailConnection" data-l10n-id="pref-mail-verify-connection"></button>
        <button id="zotero-prefpane-__addonRef__-syncAgentMail" data-l10n-id="pref-agentMail-sync"></button>
        <button id="zotero-prefpane-__addonRef__-authAgentMail" data-l10n-id="pref-agentMail-auth"></button>
      </hbox>
    </html:div>

    <html:div id="zotero-prefpane-__addonRef__-agentMailSection" style="margin-top: 8px; border: 1px solid var(--fill-quinary); border-radius: 6px; padding: 8px; display: none;">
      <html:h3 data-l10n-id="pref-agentMail-section-agent-mail" style="margin: 0 0 8px 0;"></html:h3>
      <html:div style="display: grid; grid-template-columns: minmax(120px, 180px) minmax(220px, 1fr); gap: 6px 10px; align-items: center; max-width: 100%; margin-top: 8px;">
        <html:label for="zotero-prefpane-__addonRef__-agentMailCliPath" data-l10n-id="pref-agentMail-cliPath-label"></html:label>
        <html:input id="zotero-prefpane-__addonRef__-agentMailCliPath" type="text" style="width: 100%; box-sizing: border-box;" />
      </html:div>
      <hbox flex="1" align="start" pack="start" style="margin-top: 8px; gap: 8px; flex-wrap: wrap;">
        <button id="zotero-prefpane-__addonRef__-verifyAgentMail" data-l10n-id="pref-agentMail-verify"></button>
        <button id="zotero-prefpane-__addonRef__-syncAgentMailAgent" data-l10n-id="pref-agentMail-sync"></button>
      </hbox>
    </html:div>

    <description id="zotero-prefpane-__addonRef__-agentMailStatus" data-l10n-id="pref-agentMail-status"></description>
  </groupbox>

  <description data-l10n-id="pref-help" data-l10n-args='{"name": "__addonName__","version":"__buildVersion__"}'></description>
</vbox>
